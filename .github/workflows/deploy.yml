name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            seance1-qualite-logicielle/pnpm-lock.yaml
            seance2-tests-unitaires-xunit/pnpm-lock.yaml
            seance3-tdd-bonnes-pratiques/pnpm-lock.yaml
            seance4-types-tests/pnpm-lock.yaml

      - name: Install dependencies (seance1)
        working-directory: seance1-qualite-logicielle
        run: pnpm install

      - name: Build seance1 slides
        working-directory: seance1-qualite-logicielle
        run: pnpm build --base /Tests-Validation/seance1/

      - name: Install dependencies (seance2)
        working-directory: seance2-tests-unitaires-xunit
        run: pnpm install

      - name: Build seance2 slides
        working-directory: seance2-tests-unitaires-xunit
        run: pnpm build --base /Tests-Validation/seance2/

      - name: Install dependencies (seance3)
        working-directory: seance3-tdd-bonnes-pratiques
        run: pnpm install

      - name: Build seance3 slides
        working-directory: seance3-tdd-bonnes-pratiques
        run: pnpm build --base /Tests-Validation/seance3/

      - name: Install dependencies (seance4)
        working-directory: seance4-types-tests
        run: pnpm install

      - name: Build seance4 slides
        working-directory: seance4-types-tests
        run: pnpm build --base /Tests-Validation/seance4/

      - name: Assemble site
        run: |
          mkdir -p dist/seance1 dist/seance2 dist/seance3 dist/seance4 dist/tp
          cp landing/index.html dist/index.html
          cp -r seance1-qualite-logicielle/dist/. dist/seance1/
          cp -r seance2-tests-unitaires-xunit/dist/. dist/seance2/
          cp -r seance3-tdd-bonnes-pratiques/dist/. dist/seance3/
          cp -r seance4-types-tests/dist/. dist/seance4/
          cp "TP2 - les bases des tests unitaires.pdf" dist/tp/tp2.pdf 2>/dev/null || true
          cp "TP3 - doublures de test.pdf"             dist/tp/tp3.pdf 2>/dev/null || true
          cp "TP4 - tests integration.pdf"             dist/tp/tp4.pdf 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
